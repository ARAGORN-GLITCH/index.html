<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stable POS System</title>

<style>
body { font-family: Arial; margin:40px; }
table { width:100%; border-collapse: collapse; }
th,td { border:1px solid #ddd; padding:8px; text-align:center; }
th { background:#007bff; color:white; }
.subtotal { background:#dff0d8; font-weight:bold; }
</style>
</head>

<body>

<h2>Stable POS (No Disappearing)</h2>

<button onclick="addCustomer()">Add Customer</button>

<table id="table">
<thead>
<tr>
<th>Name</th><th>Product</th><th>Qty</th><th>Price</th>
<th>Total</th><th>Payment</th><th>Received</th><th>Change</th><th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3>Grand: ₱ <span id="grand">0</span></h3>

<script>
const BIN_ID="YOUR_BIN_ID";
const API_KEY="YOUR_API_KEY";

let isEditing=false;

/* PRODUCTS */
const products={Coke:20,Pepsi:18,Water:10,Chips:15};

/* ADD CUSTOMER */
function addCustomer(){
  const id=Date.now();
  addItem(id);

  const sub=document.createElement("tr");
  sub.className="subtotal";
  sub.dataset.group=id;
  sub.innerHTML=`<td colspan="4">Customer Total</td>
  <td class="subVal">0</td><td colspan="4"></td>`;
  tableBody().appendChild(sub);
}

/* ADD ITEM */
function addItem(group,data={}){
  const row=document.createElement("tr");
  row.dataset.group=group;

  row.innerHTML=`
  <td><input value="${data.name||""}" onfocus="isEditing=true" onblur="isEditing=false;saveLocal()"></td>
  <td><select onchange="setPrice(this)">
    <option></option>
    ${Object.keys(products).map(p=>`<option ${data.product==p?"selected":""}>${p}</option>`)}
  </select></td>
  <td><input type="number" value="${data.qty||1}" oninput="calc(this)" onfocus="isEditing=true" onblur="isEditing=false"></td>
  <td><input type="number" value="${data.price||0}" oninput="calc(this)"></td>
  <td class="total">0</td>
  <td><select onchange="calcAll()">
    <option></option><option>Cash</option><option>GCash</option><option>BPI</option>
  </select></td>
  <td><input type="number" value="${data.received||0}" oninput="calc(this)"></td>
  <td class="change">0</td>
  <td><button onclick="addItem(${group})">+</button></td>
  `;

  const sub=findSubtotal(group);
  if(sub) tableBody().insertBefore(row,sub);
  else tableBody().appendChild(row);
}

/* HELPERS */
function tableBody(){return document.querySelector("#table tbody");}
function findSubtotal(g){
  return [...tableBody().children].find(r=>r.dataset.group==g && r.classList.contains("subtotal"));
}

/* CALC */
function setPrice(sel){
  const row=sel.closest("tr");
  if(products[sel.value]) row.cells[3].children[0].value=products[sel.value];
  calc(row.cells[2]);
}

function calc(input){
  const r=input.closest("tr");
  const qty=+r.cells[2].children[0].value;
  const price=+r.cells[3].children[0].value;
  const rec=+r.cells[6].children[0].value;

  const total=qty*price;
  const change=rec-total;

  r.cells[4].innerText=total.toFixed(2);
  r.cells[7].innerText=change.toFixed(2);
  r.cells[7].style.color=change<0?"red":"green";

  updateSub(r.dataset.group);
  calcAll();
  saveLocal();
}

function updateSub(g){
  let sum=0,sub;
  tableBody().querySelectorAll("tr").forEach(r=>{
    if(r.dataset.group==g){
      if(r.classList.contains("subtotal")) sub=r;
      else sum+=+r.cells[4].innerText||0;
    }
  });
  if(sub) sub.querySelector(".subVal").innerText=sum.toFixed(2);
}

function calcAll(){
  let total=0;
  tableBody().querySelectorAll(".total").forEach(c=>total+=+c.innerText||0);
  document.getElementById("grand").innerText=total.toFixed(2);
}

/* LOCAL SAVE (MAIN PROTECTION) */
function saveLocal(){
  const data=[];
  tableBody().querySelectorAll("tr").forEach(r=>{
    if(!r.classList.contains("subtotal")){
      data.push({
        g:r.dataset.group,
        n:r.cells[0].children[0].value,
        p:r.cells[1].children[0].value,
        q:r.cells[2].children[0].value,
        pr:r.cells[3].children[0].value,
        pay:r.cells[5].children[0].value,
        rec:r.cells[6].children[0].value
      });
    }
  });
  localStorage.setItem("backup",JSON.stringify(data));
}

/* LOAD LOCAL FIRST */
function loadLocal(){
  const data=JSON.parse(localStorage.getItem("backup")||"[]");
  if(data.length===0){addCustomer();return;}

  const groups={};
  data.forEach(d=>{
    if(!groups[d.g]) groups[d.g]=[];
    groups[d.g].push(d);
  });

  for(let g in groups){
    addCustomer();
    groups[g].forEach(i=>addItem(g,{
      name:i.n,product:i.p,qty:i.q,price:i.pr,received:i.rec
    }));
  }
}

/* BACKGROUND SYNC ONLY (NO UI TOUCH) */
setInterval(async ()=>{
  if(isEditing) return;

  const local=localStorage.getItem("backup")||"[]";

  await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "X-Master-Key":API_KEY
    },
    body:local
  });

},3000);

/* INIT */
loadLocal();
</script>

</body>
</html>
