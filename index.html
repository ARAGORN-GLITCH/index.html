<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CAMP CALYE MANAGEMENT SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 30px;
  background: linear-gradient(135deg, #fff3e0, #ffe0b2, #dcedc8);
}

h2 { color: #e65100; }

button {
  background: linear-gradient(135deg, #ff9800, #ffc107);
  border: none;
  color: white;
  padding: 8px 14px;
  margin-right: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
}

.card {
  background: white;
  margin-top: 15px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th {
  background: #ff9800;
  color: white;
  padding: 8px;
}

td {
  padding: 6px;
  text-align: center;
}

input, select {
  width: 95%;
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #ddd;
}

.totalBox {
  font-weight: bold;
  margin-top: 10px;
}

.paymentBox {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 2px solid #eee;
}
</style>
</head>

<body>

<h2>🏕️ CAMP CALYE !!!</h2>

<button onclick="addPerson()">Add Person</button>
<button onclick="exportExcel()">Export Excel</button>

<div id="container"></div>

<h3>💰 Grand Total: ₱ <span id="grand">0</span></h3>

<h3>
💵 Cash: ₱ <span id="cashTotal">0</span><br>
📱 GCash: ₱ <span id="gcashTotal">0</span><br>
🏦 BPI: ₱ <span id="bpiTotal">0</span><br>
🎁 Donations: ₱ <span id="donatedTotal">0</span>
</h3>

<script>
const products = {
  "Camp": 3600,
  "Workshop": 300,
  "Food Package": 150,
  "Game": 200
};

/* ADD PERSON */
function addPerson() {
  const id = Date.now();

  const card = document.createElement("div");
  card.className = "card";
  card.dataset.person = id;

  card.innerHTML = `
    <input placeholder="Person Name" style="width:100%; padding:8px; margin-bottom:10px;">

    <button onclick="addTransaction(${id})">+ Add Transaction</button>

    <table>
      <thead>
        <tr>
          <th>Activity</th>
          <th>Qty</th>
          <th>Fee</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody class="body"></tbody>
    </table>

    <div class="paymentBox">
      <select class="paymentType" onchange="calcAll()">
        <option></option>
        <option>Cash</option>
        <option>GCash</option>
        <option>BPI</option>
      </select>

      <input type="number" class="paidAmount" placeholder="Amount Paid" oninput="calcAll()">

      <input type="number" class="donatedAmount" value="0" placeholder="Donation" oninput="calcAll()">

      <div>
        Change: ₱ <span class="change">0</span>
      </div>
    </div>

    <div class="totalBox">
      Person Total: ₱ <span class="total">0</span>
    </div>
  `;

  document.getElementById("container").appendChild(card);

  addTransaction(id);
}

/* ADD TRANSACTION */
function addTransaction(personId) {
  const body = document.querySelector(`[data-person='${personId}'] .body`);

  const row = document.createElement("tr");

  row.innerHTML = `
    <td>
      <select onchange="setPrice(this)">
        <option></option>
        ${Object.keys(products).map(p => `<option>${p}</option>`).join("")}
      </select>
    </td>

    <td><input value="1" oninput="calc(this)"></td>
    <td><input value="0" oninput="calc(this)"></td>
    <td class="t">0</td>
  `;

  body.appendChild(row);
  calcAll();
}

/* AUTO PRICE */
function setPrice(sel) {
  const r = sel.closest("tr");
  r.cells[2].children[0].value = products[sel.value] || 0;
  calc(sel);
}

/* CALC ROW */
function calc(el) {
  const r = el.closest("tr");

  const qty = +r.cells[1].children[0].value;
  const fee = +r.cells[2].children[0].value;

  r.cells[3].innerText = (qty * fee).toFixed(2);

  calcAll();
}

/* 🔥 FINAL FIX (DONATION INCLUDED IN GRAND TOTAL) */
function calcAll() {
  let grand = 0;

  let cash = 0;
  let gcash = 0;
  let bpi = 0;
  let donated = 0;

  document.querySelectorAll(".card").forEach(card => {

    let total = 0;

    card.querySelectorAll(".t").forEach(t => {
      total += +t.innerText || 0;
    });

    card.querySelector(".total").innerText = total.toFixed(2);

    const paymentType = card.querySelector(".paymentType").value;
    const paid = +card.querySelector(".paidAmount").value || 0;
    const donate = +card.querySelector(".donatedAmount").value || 0;

    const change = paid - total - donate;

    card.querySelector(".change").innerText = change.toFixed(2);

    // ✔ GRAND INCLUDES DONATION
    grand += total + donate;

    if (paymentType === "Cash") cash += paid;
    if (paymentType === "GCash") gcash += paid;
    if (paymentType === "BPI") bpi += paid;

    donated += donate;
  });

  document.getElementById("grand").innerText = grand.toFixed(2);

  document.getElementById("cashTotal").innerText = cash.toFixed(2);
  document.getElementById("gcashTotal").innerText = gcash.toFixed(2);
  document.getElementById("bpiTotal").innerText = bpi.toFixed(2);
  document.getElementById("donatedTotal").innerText = donated.toFixed(2);
}

/* 📊 EXPORT EXCEL */
function exportExcel() {
  let rows = [];

  document.querySelectorAll("table").forEach(table => {
    table.querySelectorAll("tr").forEach(tr => {
      let row = [];

      tr.querySelectorAll("th,td").forEach(td => {
        let val =
          td.querySelector("input")?.value ||
          td.querySelector("select")?.value ||
          td.innerText;

        row.push(val);
      });

      rows.push(row.join(","));
    });
  });

  const blob = new Blob([rows.join("\n")], { type: "text/csv" });
  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "camp_date";
  a.click();
}
</script>

</body>
</html>
