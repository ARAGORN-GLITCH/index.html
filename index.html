<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POS with Payment Summary</title>

<style>
body { font-family: Arial; margin:40px; }
table { width:100%; border-collapse: collapse; }
th,td { border:1px solid #ddd; padding:8px; text-align:center; }
th { background:#007bff; color:white; }
.subtotal { background:#dff0d8; font-weight:bold; }
button { margin-right:10px; padding:6px 10px; }
.summary { margin-top:20px; font-size:16px; }
</style>
</head>

<body>

<h2>Stable POS System</h2>

<button onclick="addCustomer()">Add Customer</button>
<button onclick="exportExcel()">Export to Excel</button>

<table id="table">
<thead>
<tr>
<th>Name</th><th>Product</th><th>Qty</th><th>Price</th>
<th>Total</th><th>Payment</th><th>Received</th><th>Change</th><th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3>Grand Total: ₱ <span id="grand">0</span></h3>

<div class="summary">
<strong>Cash: ₱ <span id="cashTotal">0</span></strong><br>
<strong>GCash: ₱ <span id="gcashTotal">0</span></strong><br>
<strong>BPI: ₱ <span id="bpiTotal">0</span></strong><br>
<strong>Donated: ₱ <span id="donatedTotal">0</span></strong>
</div>

<script>
const BIN_ID="YOUR_BIN_ID";
const API_KEY="YOUR_API_KEY";

const products={Coke:20,Pepsi:18,Water:10,Chips:15};

/* ADD CUSTOMER */
function addCustomer(){
  const id=Date.now();
  addItem(id);

  const sub=document.createElement("tr");
  sub.className="subtotal";
  sub.dataset.group=id;
  sub.innerHTML=`<td colspan="4">Customer Total</td>
  <td class="subVal">0</td><td colspan="4"></td>`;
  tableBody().appendChild(sub);
}

/* ADD ITEM */
function addItem(group,data={}){
  const row=document.createElement("tr");
  row.dataset.group=group;

  row.innerHTML=`
  <td><input value="${data.name||""}" oninput="saveLocal()"></td>
  <td><select onchange="setPrice(this)">
    <option></option>
    ${Object.keys(products).map(p=>`<option ${data.product==p?"selected":""}>${p}</option>`)}
  </select></td>
  <td><input type="number" value="${data.qty||1}" oninput="calc(this)"></td>
  <td><input type="number" value="${data.price||0}" oninput="calc(this)"></td>
  <td class="total">0</td>
  <td>
    <select onchange="calcAll()">
      <option></option>
      <option>Cash</option>
      <option>GCash</option>
      <option>BPI</option>
      <option>Donated</option>
    </select>
  </td>
  <td><input type="number" value="${data.received||0}" oninput="calc(this)"></td>
  <td class="change">0</td>
  <td><button onclick="addItem(${group})">+</button></td>
  `;

  const sub=findSubtotal(group);
  if(sub) tableBody().insertBefore(row,sub);
  else tableBody().appendChild(row);
}

/* HELPERS */
function tableBody(){return document.querySelector("#table tbody");}
function findSubtotal(g){
  return [...tableBody().children].find(r=>r.dataset.group==g && r.classList.contains("subtotal"));
}

/* CALC */
function setPrice(sel){
  const row=sel.closest("tr");
  if(products[sel.value]) row.cells[3].children[0].value=products[sel.value];
  calc(row.cells[2]);
}

function calc(input){
  const r=input.closest("tr");
  const qty=+r.cells[2].children[0].value;
  const price=+r.cells[3].children[0].value;
  const rec=+r.cells[6].children[0].value;

  const total=qty*price;
  const change=rec-total;

  r.cells[4].innerText=total.toFixed(2);
  r.cells[7].innerText=change.toFixed(2);
  r.cells[7].style.color=change<0?"red":"green";

  updateSub(r.dataset.group);
  calcAll();
  saveLocal();
}

function updateSub(g){
  let sum=0,sub;
  tableBody().querySelectorAll("tr").forEach(r=>{
    if(r.dataset.group==g){
      if(r.classList.contains("subtotal")) sub=r;
      else sum+=+r.cells[4].innerText||0;
    }
  });
  if(sub) sub.querySelector(".subVal").innerText=sum.toFixed(2);
}

/* TOTALS */
function calcAll(){
  let grand=0, cash=0, gcash=0, bpi=0, donated=0;

  tableBody().querySelectorAll("tr").forEach(r=>{
    if(!r.classList.contains("subtotal")){
      const total=+r.cells[4].innerText||0;
      const pay=r.cells[5].children[0].value;

      grand+=total;

      if(pay==="Cash") cash+=total;
      if(pay==="GCash") gcash+=total;
      if(pay==="BPI") bpi+=total;
      if(pay==="Donated") donated+=total;
    }
  });

  document.getElementById("grand").innerText=grand.toFixed(2);
  document.getElementById("cashTotal").innerText=cash.toFixed(2);
  document.getElementById("gcashTotal").innerText=gcash.toFixed(2);
  document.getElementById("bpiTotal").innerText=bpi.toFixed(2);
  document.getElementById("donatedTotal").innerText=donated.toFixed(2);
}

/* SAVE LOCAL */
function saveLocal(){
  const data=[];
  tableBody().querySelectorAll("tr").forEach(r=>{
    if(!r.classList.contains("subtotal")){
      data.push({
        g:r.dataset.group,
        n:r.cells[0].children[0].value,
        p:r.cells[1].children[0].value,
        q:r.cells[2].children[0].value,
        pr:r.cells[3].children[0].value,
        pay:r.cells[5].children[0].value,
        rec:r.cells[6].children[0].value
      });
    }
  });
  localStorage.setItem("backup",JSON.stringify(data));
}

/* LOAD */
function loadLocal(){
  const data=JSON.parse(localStorage.getItem("backup")||"[]");
  if(data.length===0){addCustomer();return;}

  const groups={};
  data.forEach(d=>{
    if(!groups[d.g]) groups[d.g]=[];
    groups[d.g].push(d);
  });

  for(let g in groups){
    addCustomer();
    groups[g].forEach(i=>addItem(g,{
      name:i.n,product:i.p,qty:i.q,price:i.pr,received:i.rec
    }));
  }
}

/* EXPORT EXCEL */
function exportExcel(){
  let csv=[];
  csv.push(["Name","Product","Qty","Price","Total","Payment","Received","Change"].join(","));

  let cash=0,gcash=0,bpi=0,donated=0;

  document.querySelectorAll("#table tbody tr").forEach(r=>{
    if(!r.classList.contains("subtotal")){
      const total=+r.cells[4].innerText||0;
      const pay=r.cells[5].children[0].value;

      if(pay==="Cash") cash+=total;
      if(pay==="GCash") gcash+=total;
      if(pay==="BPI") bpi+=total;
      if(pay==="Donated") donated+=total;

      csv.push([
        r.cells[0].children[0].value,
        r.cells[1].children[0].value,
        r.cells[2].children[0].value,
        r.cells[3].children[0].value,
        r.cells[4].innerText,
        pay,
        r.cells[6].children[0].value,
        r.cells[7].innerText
      ].join(","));
    }
  });

  csv.push("");
  csv.push("SUMMARY");
  csv.push("Cash,"+cash.toFixed(2));
  csv.push("GCash,"+gcash.toFixed(2));
  csv.push("BPI,"+bpi.toFixed(2));
  csv.push("Donated,"+donated.toFixed(2));

  const blob=new Blob([csv.join("\n")],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="sales.csv";
  a.click();
}

/* INIT */
loadLocal();
</script>

</body>
</html>
