<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Business Tally (Stable Sync)</title>

<style>
  body { font-family: Arial; margin: 40px; background: #f4f6f9; }
  table { width: 100%; border-collapse: collapse; background: #fff; }
  th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
  th { background: #007bff; color: white; }
  input, select { width: 100%; padding: 5px; }
  button { padding: 6px 10px; cursor: pointer; margin-right: 5px; }
</style>
</head>

<body>

<h1>Business Sales Tally (Cloud Sync)</h1>

<button onclick="addRow()">Add Row</button>
<button onclick="saveData()">Save</button>
<button onclick="loadData()">Refresh</button>

<table id="table">
<thead>
<tr>
  <th>Name</th>
  <th>Product</th>
  <th>Qty</th>
  <th>Price</th>
  <th>Total</th>
  <th>Payment</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3>Grand Total: ₱ <span id="grand">0</span></h3>
<h3>Cash: ₱ <span id="cash">0</span></h3>
<h3>GCash: ₱ <span id="gcash">0</span></h3>
<h3>BPI: ₱ <span id="bpi">0</span></h3>

<script>
const BIN_ID = "YOUR_BIN_ID";
const API_KEY = "YOUR_API_KEY";

const products = {
  Coke: 20,
  Pepsi: 18,
  Water: 10,
  Chips: 15
};

function addRow(data={}) {
  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td><input value="${data.name||""}"></td>
    <td>
      <select onchange="autoPrice(this)">
        <option value="">Select</option>
        ${Object.keys(products).map(p =>
          `<option ${data.product===p?"selected":""}>${p}</option>`
        ).join("")}
      </select>
    </td>
    <td><input type="number" value="${data.qty||1}" oninput="calc(this)"></td>
    <td><input type="number" value="${data.price||0}" oninput="calc(this)"></td>
    <td class="total">0</td>
    <td>
      <select onchange="calcAll()">
        <option></option>
        <option ${data.payment==="Cash"?"selected":""}>Cash</option>
        <option ${data.payment==="GCash"?"selected":""}>GCash</option>
        <option ${data.payment==="BPI"?"selected":""}>BPI</option>
      </select>
    </td>
  `;

  document.querySelector("#table tbody").appendChild(tr);
  calcAll();
}

function autoPrice(sel) {
  const row = sel.closest("tr");
  const p = sel.value;
  if (products[p]) row.cells[3].children[0].value = products[p];
  calc(row.cells[2]);
}

function calc(input) {
  const row = input.closest("tr");
  const qty = +row.cells[2].children[0].value;
  const price = +row.cells[3].children[0].value;
  row.cells[4].innerText = (qty*price).toFixed(2);
  calcAll();
}

function calcAll() {
  let grand=0, cash=0, gcash=0, bpi=0;

  document.querySelectorAll("#table tbody tr").forEach(r=>{
    const total = +r.cells[4].innerText || 0;
    const pay = r.cells[5].children[0].value;

    grand += total;
    if (pay==="Cash") cash+=total;
    if (pay==="GCash") gcash+=total;
    if (pay==="BPI") bpi+=total;
  });

  document.getElementById("grand").innerText = grand.toFixed(2);
  document.getElementById("cash").innerText = cash.toFixed(2);
  document.getElementById("gcash").innerText = gcash.toFixed(2);
  document.getElementById("bpi").innerText = bpi.toFixed(2);
}

/* SAVE */
async function saveData() {
  const data=[];

  document.querySelectorAll("#table tbody tr").forEach(r=>{
    data.push({
      name: r.cells[0].children[0].value,
      product: r.cells[1].children[0].value,
      qty: r.cells[2].children[0].value,
      price: r.cells[3].children[0].value,
      payment: r.cells[5].children[0].value
    });
  });

  await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": API_KEY
    },
    body: JSON.stringify(data)
  });

  alert("Saved!");
}

/* LOAD */
async function loadData() {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
    headers: { "X-Master-Key": API_KEY }
  });

  const json = await res.json();
  const data = json.record;

  document.querySelector("#table tbody").innerHTML = "";

  data.forEach(d=>addRow(d));
}

/* INIT */
loadData();
</script>

</body>
</html>
